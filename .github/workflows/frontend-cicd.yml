name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Lint, Format & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: ESLint (soft check)
        run: npm run lint
        continue-on-error: true

      - name: Prettier (soft check)
        run: npm run format:check
        continue-on-error: true

      - name: Unit Tests (optional)
        run: |
          if npm run | grep -q " test"; then
            npm run test -- --run
          else
            echo "ℹ️ No unit tests available – skipping"
          fi

      - name: Build application
        run: npm run build

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dozilab/appstore-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_KEYCLOAK_URL=${{ secrets.VITE_KEYCLOAK_URL }}
            VITE_KEYCLOAK_REALM=${{ secrets.VITE_KEYCLOAK_REALM }}
            VITE_KEYCLOAK_CLIENT_ID=${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}

  deploy:
    name: Deploy via Internal Network
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.APPSTORE_SERVER_SSH_KEY }}

      - name: Remote Deployment
        env:
          SERVER_HOST: ${{ secrets.APPSTORE_SERVER_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_HOST bash -s << 'ENDSSH'

            cd /home/ubuntu/app-store || { echo "❌ Path not found"; exit 1; }

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull frontend

            docker compose up frontend -d --force-recreate --remove-orphans

            echo "🔍 Waiting for health check..."
            NEXT_WAIT_TIME=0
            until curl -f http://localhost:80 || [ $NEXT_WAIT_TIME -eq 10 ]; do
               sleep $(( NEXT_WAIT_TIME++ ))
               echo "Retry check... ($NEXT_WAIT_TIME/10)"
            done

            if ! curl -f http://localhost:80; then
               echo "❌ Deployment failed!"
               docker compose logs frontend --tail=50
               exit 1
            fi

            docker image prune -af --filter "until=24h"
          ENDSSH
